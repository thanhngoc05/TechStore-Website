<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../assets/img/LOGO1.png" type="image/x-icon" />
    <title>NexTech Đăng ký</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f4f7fe;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .register-container {
        width: 100%;
        max-width: 380px;
        padding: 20px 25px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        background-color: #fff;
      }
      .logo {
        margin-bottom: 10px;
      }
      .logo img {
        max-width: 150px;
        height: auto;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 15px;
        color: #1a234a;
      }
      form {
        text-align: left;
      }
      .input-group {
        margin-bottom: 12px;
        position: relative;
      }
      .input-group label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        color: #333;
        font-size: 0.85em;
      }
      .input-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #dcdfe6;
        border-radius: 8px;
        font-size: 0.95em;
        box-sizing: border-box;
        transition: all 0.3s;
      }
      .input-group input:focus {
        border-color: #3b82f6;
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
      }
      .toggle-password {
        position: absolute;
        right: 12px;
        top: 32px;
        cursor: pointer;
        color: #909399;
        font-size: 14px;
        padding: 5px;
      }
      .primary-btn {
        width: 100%;
        padding: 12px;
        background-color: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: background 0.3s;
      }
      .primary-btn:hover {
        background-color: #2563eb;
      }
      footer {
        margin-top: 20px;
        font-size: 0.85em;
        color: #606266;
        border-top: 1px solid #f0f2f5;
        padding-top: 15px;
      }
      footer a {
        color: #3b82f6;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <header>
        <div class="logo">
          <a href="./index.html">
            <img src="../assets/img/Logo_white.png" alt="NexTech Logo" />
          </a>
        </div>
      </header>
      <main>
        <h2>Đăng ký tài khoản</h2>
        <form id="registerForm">
          <div class="input-group">
            <label for="username">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              placeholder="Nhập tên đăng nhập"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="Nhập mật khẩu"
              required
            />
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>

          <div class="input-group">
            <label for="confirm_password">Xác nhận mật khẩu</label>
            <input
              type="password"
              id="confirm_password"
              placeholder="Nhập lại mật khẩu"
              required
            />
            <i
              class="fas fa-eye toggle-password"
              id="toggleConfirmPassword"
            ></i>
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="example@gmail.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="phone">Số điện thoại</label>
            <input
              type="tel"
              id="phone"
              placeholder="0xxx xxx xxx"
              pattern="[0-9]{10,11}"
              required
            />
          </div>

          <button type="submit" class="primary-btn">Tạo tài khoản</button>
        </form>
      </main>
      <footer>
        <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
      </footer>
    </div>

    <script>
      function setupToggle(btnId, inputId) {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        btn.addEventListener("click", function () {
          const isPassword = input.getAttribute("type") === "password";
          input.setAttribute("type", isPassword ? "text" : "password");
          this.classList.toggle("fa-eye");
          this.classList.toggle("fa-eye-slash");
        });
      }
      setupToggle("togglePassword", "password");
      setupToggle("toggleConfirmPassword", "confirm_password");

      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const email = document.getElementById("email").value;
          const phone = document.getElementById("phone").value; // LẤY GIÁ TRỊ PHONE
          const confirm_password =
            document.getElementById("confirm_password").value;

          if (password !== confirm_password) {
            alert("Mật khẩu xác nhận không khớp!");
            return;
          }

          try {
            const response = await fetch("/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password, email, phone }), // GỬI PHONE LÊN SERVER
            });

            const data = await response.json();
            if (response.ok) {
              alert("Đăng ký thành công!");
              window.location.href = "login.html";
            } else {
              alert("Lỗi: " + data.msg);
            }
          } catch (error) {
            alert("Lỗi: Không thể kết nối tới server Backend!");
          }
        });
    </script>
  </body>
</html>
